server:
  port: ${SERVER_PORT:8086}

spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  application:
    name: interaction-service

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://interaction-db:5432/interaction_service_db}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

jwt:
  secret: ${JWT_SECRET:5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437}
  expiration: ${JWT_EXPIRATION:86400000}

services:
  user-service:
    url: ${USER_SERVICE_URL:http://user-service:8081}
  blog-service:
    url: ${BLOG_SERVICE_URL:http://blog-service:8082}

management:
  endpoints:
    web:
      exposure:
        include: health,info
