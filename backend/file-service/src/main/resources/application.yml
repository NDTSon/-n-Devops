server:
  port: ${SERVER_PORT:8083}

spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  application:
    name: file-service

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://file-db:5432/file_service_db}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 50MB

seaweedfs:
  master:
    url: ${SEAWEEDFS_MASTER_URL:http://seaweedfs-master:9333}
  filer:
    url: ${SEAWEEDFS_FILER_URL:http://seaweedfs-filer:8888}

jwt:
  secret: ${JWT_SECRET:your_secure_jwt_secret_key_here}
  expiration: ${JWT_EXPIRATION:86400000}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: true
  endpoint:
    health:
      show-details: always
