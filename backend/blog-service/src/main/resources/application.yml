server:
  port: ${SERVER_PORT:8082}

spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  application:
    name: blog-service

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://blog-db:5432/blog_service_db}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

jwt:
  secret: ${JWT_SECRET:your_secure_jwt_secret_key_here}
  expiration: ${JWT_EXPIRATION:86400000}

services:
  file-service:
    url: ${FILE_SERVICE_URL:http://file-service:8083}
  user-service:
    url: ${USER_SERVICE_URL:http://user-service:8081}

file:
  service:
    url: ${FILE_SERVICE_URL:http://file-service:8083}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: true
