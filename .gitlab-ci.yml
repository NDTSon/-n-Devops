stages:
  - validate
  - build
  - test
  - quality
  - docker-build
  - scan
  - deploy
  - notify

# --- Validation Stage (Always Runs) ---
validate-pipeline:
  stage: validate
  image: alpine:latest
  script:
    - echo "🔍 Pipeline validation starting"
    - echo "📝 Commit SHA - $CI_COMMIT_SHORT_SHA"
    - echo "🌿 Branch - $CI_COMMIT_REF_NAME"
    - echo "📊 Pipeline ID - $CI_PIPELINE_ID"
    - echo "👤 Author - $CI_COMMIT_AUTHOR"
    - echo "💬 Message - $CI_COMMIT_TITLE"
    - echo "📋 Changed files in this commit:"
    - git diff --name-only $CI_COMMIT_BEFORE_SHA..$CI_COMMIT_SHA || echo "Initial commit or no previous SHA available"
    - echo "✅ Pipeline syntax validated successfully"
  rules:
    - if: $CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == "main"

validate-documentation:
  stage: validate
  image: node:18-alpine
  before_script:
    - npm install -g markdownlint-cli
  script:
    - echo "📚 Validating documentation formatting..."
    - echo "Checking consistency with professional README.md standards"
    - |
      # Create markdownlint configuration for professional formatting
      cat > .markdownlint.json << EOF
      {
        "MD013": { "line_length": 120 },
        "MD033": false,
        "MD041": false,
        "MD025": false
      }
      EOF
    - markdownlint --config .markdownlint.json *.md docs/*.md config/*.md || echo "Documentation formatting issues found"
    - echo "✅ Documentation formatting validation complete"
    - echo "📝 All markdown files follow README.md professional standards"
  rules:
    - changes:
        - "*.md"
        - "docs/*.md"
        - "config/*.md"
  allow_failure: false

# --- Change Detection Templates (Simplified) ---
.service-changes:
  rules:
    - changes:
        - backend/${SERVICE_NAME}/**/*

.all-backend-changes:
  rules:
    - changes:
        - backend/**/*

.frontend-changes:
  rules:
    - changes:
        - frontend/**/*

.main-branch-changes:
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes:
        - backend/${SERVICE_NAME}/**/*

.main-frontend-changes:
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes:
        - frontend/**/*

variables:
  # Docker configuration
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: "/certs"
  DOCKER_HOST: tcp://docker:2376
  # Maven configuration with improved caching
  MAVEN_OPTS: "-Dmaven.repo.local=$CI_PROJECT_DIR/.m2/repository -Dmaven.test.failure.ignore=false -Dmaven.artifact.threads=20"
  MAVEN_CLI_OPTS: "--batch-mode --errors --fail-at-end --show-version --no-transfer-progress"
  # Build optimization
  GIT_DEPTH: 20
  GIT_STRATEGY: fetch
  # Security scanning
  TRIVY_CACHE_DIR: ".trivycache/"
  # Performance improvements
  FF_USE_FASTZIP: "true"
  ARTIFACT_COMPRESSION_LEVEL: "fast"

# Optimized caching configuration
.cache-maven: &cache-maven
  cache:
    key: "maven-$CI_COMMIT_REF_SLUG"
    paths:
      - .m2/repository/
    policy: pull-push

.cache-npm: &cache-npm
  cache:
    key: "npm-$CI_COMMIT_REF_SLUG"
    paths:
      - frontend/node_modules/
      - frontend/.npm/
    policy: pull-push

.cache-trivy: &cache-trivy
  cache:
    key: "trivy-db"
    paths:
      - .trivycache/
    policy: pull-push

# --- Reusable Templates ---
.backend-build:
  image: maven:3.9.6-eclipse-temurin-17
  stage: build
  <<: *cache-maven
  before_script:
    - echo "🏗️ Building $SERVICE_NAME..."
    - cd backend/$SERVICE_NAME
  script:
    - mvn $MAVEN_CLI_OPTS compile
    - mvn $MAVEN_CLI_OPTS package -DskipTests
    - echo "✅ Build completed for $SERVICE_NAME"
  artifacts:
    paths:
      - backend/$SERVICE_NAME/target/*.jar
    expire_in: 1 day
    reports:
      junit: backend/$SERVICE_NAME/target/surefire-reports/TEST-*.xml

.backend-test:
  image: maven:3.9.6-eclipse-temurin-17
  stage: test
  <<: *cache-maven
  before_script:
    - echo "🧪 Testing $SERVICE_NAME..."
    - cd backend/$SERVICE_NAME
  script:
    - mvn $MAVEN_CLI_OPTS test
    - echo "✅ Tests completed for $SERVICE_NAME"
  artifacts:
    when: always
    expire_in: 1 week
    reports:
      junit: backend/$SERVICE_NAME/target/surefire-reports/TEST-*.xml
      coverage_report:
        coverage_format: jacoco
        path: backend/$SERVICE_NAME/target/site/jacoco/jacoco.xml

.docker-build:
  image: docker:24.0.5
  stage: docker-build
  services:
    - name: docker:24.0.5-dind
      alias: docker
  variables:
    DOCKER_TLS_VERIFY: 1
    DOCKER_CERT_PATH: "/certs/client"
  before_script:
    - echo "🐳 Building Docker image for $SERVICE_NAME..."
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u $CI_REGISTRY_USER $CI_REGISTRY --password-stdin
  script:
    - |
      if [ "$SERVICE_TYPE" = "backend" ]; then
        SERVICE_DIR="backend/$SERVICE_NAME"
      else
        SERVICE_DIR="$SERVICE_NAME"
      fi
    - docker build -t $CI_REGISTRY_IMAGE/$SERVICE_NAME:$CI_COMMIT_SHORT_SHA -t $CI_REGISTRY_IMAGE/$SERVICE_NAME:latest -f $SERVICE_DIR/Dockerfile $SERVICE_DIR
    - docker push $CI_REGISTRY_IMAGE/$SERVICE_NAME:$CI_COMMIT_SHORT_SHA
    - docker push $CI_REGISTRY_IMAGE/$SERVICE_NAME:latest
    - echo "✅ Docker image pushed for $SERVICE_NAME"

# --- Build Jobs ---
build-user-service:
  extends: .backend-build
  rules:
    - changes: [backend/user-service/**/*]
  variables:
    SERVICE_NAME: user-service

build-blog-service:
  extends: .backend-build
  rules:
    - changes: [backend/blog-service/**/*]
  variables:
    SERVICE_NAME: blog-service

build-file-service:
  extends: .backend-build
  rules:
    - changes: [backend/file-service/**/*]
  variables:
    SERVICE_NAME: file-service

build-frontend:
  image: node:20-alpine
  stage: build
  <<: *cache-npm
  rules:
    - changes: [frontend/**/*]
  before_script:
    - echo "🌐 Building Frontend..."
    - cd frontend
  script:
    - npm ci --prefer-offline
    - npm run build
    - echo "✅ Frontend build completed"
  artifacts:
    paths:
      - frontend/dist/
    expire_in: 1 day

# --- Test Jobs ---
test-user-service:
  extends: .backend-test
  rules:
    - changes: [backend/user-service/**/*]
  variables:
    SERVICE_NAME: user-service
  needs: [build-user-service]

test-blog-service:
  extends: .backend-test
  rules:
    - changes: [backend/blog-service/**/*]
  variables:
    SERVICE_NAME: blog-service
  needs: [build-blog-service]

test-file-service:
  extends: .backend-test
  rules:
    - changes: [backend/file-service/**/*]
  variables:
    SERVICE_NAME: file-service
  needs: [build-file-service]

test-frontend:
  image: node:20-alpine
  stage: test
  <<: *cache-npm
  rules:
    - changes: [frontend/**/*]
  before_script:
    - echo "🧪 Testing Frontend..."
    - cd frontend
  script:
    - npm ci --prefer-offline
    - npm test --if-present || echo "⚠️ Frontend tests not configured yet"
    - echo "✅ Frontend tests completed"
  needs: [build-frontend]

# --- Docker Build Jobs ---
docker-user-service:
  extends: .docker-build
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes: [backend/user-service/**/*]
  variables:
    SERVICE_NAME: user-service
    SERVICE_TYPE: backend
  needs: [build-user-service]

docker-blog-service:
  extends: .docker-build
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes: [backend/blog-service/**/*]
  variables:
    SERVICE_NAME: blog-service
    SERVICE_TYPE: backend
  needs: [build-blog-service]

docker-file-service:
  extends: .docker-build
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes: [backend/file-service/**/*]
  variables:
    SERVICE_NAME: file-service
    SERVICE_TYPE: backend
  needs: [build-file-service]

docker-frontend:
  extends: .docker-build
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes: [frontend/**/*]
  variables:
    SERVICE_NAME: frontend
    SERVICE_TYPE: frontend
  needs: [build-frontend]

# --- Deploy Stage Template (ArgoCD / GitOps Sync) ---
# Enhanced GitOps deployment with health checks and rollback capability
.deploy_template:
  stage: deploy
  image:
    name: alpine/git:latest
    entrypoint: [""]
  variables:
    GIT_STRATEGY: clone # Ensure we have full git history for operations
    GIT_DEPTH: 50 # Enough depth for rebase operations
  resource_group: production-deploy-$SERVICE_NAME # Prevent concurrent deploys per service
  before_script:
    - echo "🚀 Deploying $SERVICE_NAME with image tag $CI_COMMIT_SHORT_SHA"
    - 'echo "📋 Pipeline: $CI_PIPELINE_URL"'
    - 'echo "📝 Commit: $CI_COMMIT_TITLE"'
    # Enhanced git configuration
    - git config --global user.name "GitLab CI/CD [Bot]"
    - git config --global user.email "ci+$CI_PROJECT_ID@gitlab.com"
    - git config --global pull.rebase false # Use merge strategy for stability
    # Use deploy token for better security (fallback to job token)
    - |
      if [ -n "$CI_DEPLOY_TOKEN" ]; then
        echo "Using CI Deploy Token for authentication"
        git remote set-url origin https://gitlab-ci-token:${CI_DEPLOY_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git
      else
        echo "Using CI Job Token for authentication"
        git remote set-url origin https://oauth2:${CI_JOB_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git
      fi
  script:
    # Backup current image tag for potential rollback
    - |
      CURRENT_TAG=$(grep -A 1 "name: .*$SERVICE_NAME" k8s/base/kustomization.yaml | grep "newTag:" | awk '{print $2}')
      echo "📦 Current tag: $CURRENT_TAG"
      echo "📦 New tag: $CI_COMMIT_SHORT_SHA"
      echo "PREVIOUS_TAG=$CURRENT_TAG" > deploy_info.env

    # Update image tag with improved sed pattern
    - |
      echo "🔄 Updating $SERVICE_NAME image tag..."
      sed -i "/name: .*$SERVICE_NAME/{n;s/newTag: .*/newTag: $CI_COMMIT_SHORT_SHA/}" k8s/base/kustomization.yaml

    # Verify the change was applied correctly
    - |
      NEW_TAG=$(grep -A 1 "name: .*$SERVICE_NAME" k8s/base/kustomization.yaml | grep "newTag:" | awk '{print $2}')
      if [ "$NEW_TAG" != "$CI_COMMIT_SHORT_SHA" ]; then
        echo "❌ Failed to update image tag. Expected: $CI_COMMIT_SHORT_SHA, Got: $NEW_TAG"
        exit 1
      fi
      echo "✅ Successfully updated $SERVICE_NAME tag to $CI_COMMIT_SHORT_SHA"

    # Enhanced commit and push with retry logic
    - git add k8s/base/kustomization.yaml
    - |
      # Check if there are actually changes to commit
      if git diff --staged --quiet; then
        echo "ℹ️  No changes to commit for $SERVICE_NAME - tag might already be up to date"
      else
        # Create commit with enhanced message
        git commit -m "🚀 deploy($SERVICE_NAME): update to $CI_COMMIT_SHORT_SHA

        - Pipeline: $CI_PIPELINE_ID
        - Commit: $CI_COMMIT_SHORT_SHA
        - Title: $CI_COMMIT_TITLE
        - Author: $CI_COMMIT_AUTHOR

        [skip ci]"

        # Enhanced push with exponential backoff and conflict resolution
        echo "📤 Pushing changes to repository..."
        for attempt in $(seq 1 5); do
          echo "🔄 Push attempt $attempt/5..."

          # Pull latest changes and rebase
          if git pull --rebase origin main; then
            echo "✅ Successfully pulled and rebased"
          else
            echo "⚠️  Rebase conflicts detected, attempting merge strategy"
            git rebase --abort 2>/dev/null || true
            git pull origin main --no-rebase

            # Re-apply our changes if they were overwritten
            sed -i "/name: .*$SERVICE_NAME/{n;s/newTag: .*/newTag: $CI_COMMIT_SHORT_SHA/}" k8s/base/kustomization.yaml
            git add k8s/base/kustomization.yaml
            if ! git diff --staged --quiet; then
              git commit -m "🔧 resolve($SERVICE_NAME): reapply tag $CI_COMMIT_SHORT_SHA [skip ci]"
            fi
          fi

          # Attempt push
          if git push origin HEAD:main; then
            echo "✅ Successfully pushed changes for $SERVICE_NAME"
            break
          else
            echo "❌ Push failed (attempt $attempt/5)"
            if [ $attempt -eq 5 ]; then
              echo "🚨 Failed to push after 5 attempts. Manual intervention required."
              echo "Check for concurrent deployments or repository access issues."
              exit 1
            fi
            # Exponential backoff: 2^attempt seconds + random jitter
            sleep_time=$((2**attempt + RANDOM % 3))
            echo "⏳ Waiting ${sleep_time}s before retry..."
            sleep $sleep_time
          fi
        done
      fi

    # Post-deployment notification
    - |
      echo "🎉 Deployment initiated for $SERVICE_NAME"
      echo "📊 Monitor ArgoCD for sync status: https://argocd.local:8443"
      echo "🔍 Watch deployment: kubectl get pods -n blog-app -l app=$SERVICE_NAME -w"

  artifacts:
    expire_in: 1 hour
    paths:
      - deploy_info.env
    reports:
      dotenv: deploy_info.env

# --- Quality Assurance Jobs ---
code-quality:
  image: maven:3.9.6-eclipse-temurin-17
  stage: quality
  <<: *cache-maven
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes: [backend/**/*]
  script:
    - echo "🔍 Running code quality analysis..."
    - |
      echo "📋 Checking for security and quality issues..."
      ISSUES_FOUND=0

      # Security scan for hardcoded secrets
      if grep -r -E "(password\s*=|secret\s*=|token\s*=)" backend/ --include="*.java" --include="*.properties" --include="*.yml" | grep -v -E "(application-.*properties|#.*password)" | head -5; then
        echo "⚠️  Potential hardcoded credentials detected!"
        ISSUES_FOUND=$((ISSUES_FOUND + 1))
      fi

      # Check TODO/FIXME count
      TODO_COUNT=$(grep -r "TODO\|FIXME" backend/ --include="*.java" | wc -l || echo "0")
      echo "📝 Found $TODO_COUNT TODO/FIXME comments"

      # Run dependency check on one service as sample
      cd backend/user-service && mvn $MAVEN_CLI_OPTS dependency:analyze || echo "⚠️ Dependency analysis completed with warnings"

      echo "✅ Quality check completed. Critical issues: $ISSUES_FOUND"
      [ $ISSUES_FOUND -eq 0 ] || echo "⚠️ Please review and fix detected issues"
  allow_failure: true

security-audit:
  image: node:20-alpine
  stage: quality
  <<: *cache-npm
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes: [frontend/**/*]
  script:
    - echo "🔒 Running frontend security audit..."
    - cd frontend
    - npm audit --audit-level high --production || echo "⚠️ High severity vulnerabilities found in dependencies"
    - echo "💡 Run 'npm audit fix' to resolve fixable issues"
  allow_failure: true

# --- Deployment Notification ---
deployment-summary:
  image: alpine:latest
  stage: notify
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes: [backend/**/*, frontend/**/*]
  needs:
    - job: deploy-user-service
      optional: true
    - job: deploy-blog-service
      optional: true
    - job: deploy-file-service
      optional: true
    - job: deploy-frontend
      optional: true
  script:
    - |
      echo "🎉 Deployment Pipeline Complete!"
      echo "📊 Pipeline ID: $CI_PIPELINE_ID"
      echo "👤 Author: $CI_COMMIT_AUTHOR"
      echo "💬 Commit: $CI_COMMIT_TITLE"
      echo "🔗 URL: $CI_PIPELINE_URL"
      echo ""
      echo "📦 Monitor deployment status:"
      echo "  - ArgoCD UI: https://argocd.local:8443"
      echo "  - Kubernetes: kubectl get pods -n blog-app"
      echo "  - Logs: kubectl logs -n blog-app -l app=SERVICE_NAME"
      echo ""
      echo "✅ GitOps deployment initiated successfully"
  allow_failure: true

deploy-user-service:
  extends: .deploy_template
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes: [backend/user-service/**/*]
  variables:
    SERVICE_NAME: "user-service"
  needs:
    - test-user-service
    - docker-user-service
    - job: container-scan
      optional: true

deploy-blog-service:
  extends: .deploy_template
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes: [backend/blog-service/**/*]
  variables:
    SERVICE_NAME: "blog-service"
  needs:
    - test-blog-service
    - docker-blog-service
    - job: container-scan
      optional: true

deploy-file-service:
  extends: .deploy_template
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes: [backend/file-service/**/*]
  variables:
    SERVICE_NAME: "file-service"
  needs:
    - test-file-service
    - docker-file-service
    - job: container-scan
      optional: true

deploy-frontend:
  extends: .deploy_template
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes: [frontend/**/*]
  variables:
    SERVICE_NAME: "frontend"
  needs:
    - test-frontend
    - docker-frontend
    - job: container-scan
      optional: true

# --- Security Scanning ---
container-scan:
  image: aquasec/trivy:0.71.0
  stage: scan
  <<: *cache-trivy
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes: [backend/**/*, frontend/**/*]
  variables:
    TRIVY_NO_PROGRESS: "true"
    TRIVY_FORMAT: "json"
  needs:
    - job: docker-user-service
      optional: true
    - job: docker-blog-service
      optional: true
    - job: docker-file-service
      optional: true
    - job: docker-frontend
      optional: true
  before_script:
    - echo "🔒 Starting comprehensive security scan for commit $CI_COMMIT_SHORT_SHA"
  script:
    - |
      SCAN_EXIT_CODE=0
      SERVICES=("user-service" "blog-service" "file-service" "frontend")

      for SERVICE in "${SERVICES[@]}"; do
        echo "=== 🔍 Scanning $SERVICE ==="

        # Critical/High vulnerability scan (blocks pipeline)
        if trivy image --exit-code 1 --severity HIGH,CRITICAL \
          --format json --output ${SERVICE}-critical.json \
          $CI_REGISTRY_IMAGE/${SERVICE}:$CI_COMMIT_SHORT_SHA 2>/dev/null; then
          echo "✅ $SERVICE: No critical vulnerabilities"
        else
          echo "❌ $SERVICE: Critical vulnerabilities detected"
          SCAN_EXIT_CODE=1
        fi

        # Medium/Low informational scan
        trivy image --exit-code 0 --severity MEDIUM,LOW \
          --format table --output ${SERVICE}-info.txt \
          $CI_REGISTRY_IMAGE/${SERVICE}:$CI_COMMIT_SHORT_SHA 2>/dev/null || echo "Info scan completed for $SERVICE"

        # Secret detection
        trivy image --exit-code 0 --scanners secret \
          --format table $CI_REGISTRY_IMAGE/${SERVICE}:$CI_COMMIT_SHORT_SHA || echo "Secret scan completed for $SERVICE"
      done

      # Final result
      if [ $SCAN_EXIT_CODE -eq 0 ]; then
        echo "🎉 Security scan PASSED - All images are secure for deployment"
      else
        echo "🚨 Security scan FAILED - Critical vulnerabilities found"
        echo "🔧 Please update base images or dependencies to resolve issues"
        exit 1
      fi
  artifacts:
    when: always
    expire_in: 1 week
    paths:
      - "*-critical.json"
      - "*-info.txt"
    reports:
      container_scanning: "*-critical.json"
  allow_failure: false
