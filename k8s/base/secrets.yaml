# Secret for database credentials shared across services
# NOTE: Replace these placeholder values with actual secure credentials in production
apiVersion: v1
kind: Secret
metadata:
  name: db-credentials
  namespace: blog-app
type: Opaque
stringData:
  POSTGRES_USER: your_postgres_user_here
  POSTGRES_PASSWORD: your_secure_postgres_password_here
---
# Secret for JWT and mail config
# NOTE: Generate strong, random values for production deployment
apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: blog-app
type: Opaque
stringData:
  JWT_SECRET: your_secure_jwt_secret_256bits_minimum_here
  JWT_EXPIRATION: "86400000"
  MAIL_USERNAME: your_email@domain.com
  MAIL_PASSWORD: your_app_specific_password_here
