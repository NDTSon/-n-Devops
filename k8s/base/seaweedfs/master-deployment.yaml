apiVersion: apps/v1
kind: Deployment
metadata:
  name: seaweedfs-master
  namespace: blog-app
  labels:
    app: seaweedfs-master
    tier: storage
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: seaweedfs-master
  template:
    metadata:
      labels:
        app: seaweedfs-master
        tier: storage
    spec:
      containers:
        - name: seaweedfs-master
          image: chrislusf/seaweedfs:2.94
          command: ["weed"]
          args: ["master", "-ip=seaweedfs-master", "-ip.bind=0.0.0.0", "-port=9333", "-mdir=/data"]
          ports:
            - containerPort: 9333
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "300m"
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: seaweedfs-master-pvc
