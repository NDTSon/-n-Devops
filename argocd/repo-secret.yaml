# Template for GitLab registry credentials
# Create this secret BEFORE deploying ArgoCD apps:
#   kubectl create secret docker-registry gitlab-registry \
#     --namespace blog-app \
#     --docker-server=registry.gitlab.com \
#     --docker-username=<your-gitlab-user> \
#     --docker-password=<your-deploy-token> \
#     --docker-email=<your-email>
#
# Also add the repo to ArgoCD:
#   argocd repo add https://gitlab.com/mquangpham575/DevOps.git \
#     --username <gitlab-user> \
#     --password <personal-access-token>
apiVersion: v1
kind: Secret
metadata:
  name: gitlab-registry
  namespace: blog-app
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: "<BASE64_ENCODED_DOCKER_CONFIG>"
