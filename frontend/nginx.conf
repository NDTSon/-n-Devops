server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;
    client_max_body_size 50M;
    charset utf-8;
    resolver 127.0.0.11 valid=10s ipv6=off;

    # =============================================
    # Shared proxy settings (dùng lại cho các location)
    # =============================================
    # Dùng map để set giá trị connection header cho WebSocket
    
    location / {
        try_files $uri $uri/ /index.html;
    }

    # =============================================
    # User Service: auth, users, follow
    # =============================================
    location ~ ^/api/(auth|users|follow)(/|$) {
        set $user_service user-service:8081;
        proxy_pass http://$user_service;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        # Xóa header nhạy cảm từ client — service tự inject sau khi xác thực JWT
        proxy_set_header X-User-Id "";
        proxy_set_header X-User-Role "";
        proxy_pass_request_headers on;
        proxy_buffering off;
        proxy_cache_bypass $http_upgrade;

        # Timeout ngắn để nhanh trả lỗi thay vì treo mãi
        proxy_connect_timeout 5s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;

        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS, HEAD, PATCH' always;
        add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
        add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range,Authorization,Content-Disposition' always;

        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS, HEAD, PATCH' always;
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Type' 'text/plain; charset=utf-8';
            add_header 'Content-Length' 0;
            return 204;
        }
    }

    # =============================================
    # Blog Service: blogs, categories, uploads
