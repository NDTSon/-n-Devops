<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/jpeg" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700;800&family=Crimson+Pro:ital,wght@0,400;0,600;0,700;1,400;1,600;1,700&family=Nunito:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400;1,600&display=swap" rel="stylesheet">
    <title>Blog Management System</title>
  </head>
  <body>
    <div id="root">
      <style>
        .initial-loader {
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          min-height: 100vh;
          background: linear-gradient(to bottom right, #f8fafc, #f1f5f9);
          font-family: 'Nunito', sans-serif;
        }
        .book-loader {
          --color: #0ea5e9;
          --duration: 1.5s;
          position: relative;
          width: 50px;
          height: 38px;
          perspective: 400px;
          margin-bottom: 16px;
        }
        .book-loader .page-inner {
          width: 50%;
          height: 100%;
          position: relative;
          transform-origin: 100% 50%;
          animation: book-flip var(--duration) infinite;
        }
        .book-loader .page {
          position: absolute;
          width: 100%;
          height: 100%;
          background: white;
          border-radius: 3px;
          border: 2px solid var(--color);
        }
        .book-loader .page.left {
          right: 100%;
          transform-origin: 100% 50%;
          animation: book-flip-left var(--duration) infinite;
        }
        .book-loader .page.right {
          left: 100%;
          transform-origin: 0% 50%;
          animation: book-flip-right var(--duration) infinite;
        }
        .book-loader .page.middle {
          z-index: 1;
        }
        .loader-text {
          color: #64748b;
          font-weight: 500;
          font-size: 15px;
          animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes book-flip {
          0% { transform: rotateY(0deg); z-index: 2; }
          49% { z-index: 2; }
          50% { transform: rotateY(-180deg); z-index: 0; }
          100% { transform: rotateY(0deg); z-index: 2; }
        }
        @keyframes book-flip-left {
          0% { transform: rotateY(0deg); }
          50% { transform: rotateY(180deg); }
          100% { transform: rotateY(0deg); }
        }
        @keyframes book-flip-right {
          0% { transform: rotateY(0deg); }
          50% { transform: rotateY(-180deg); }
          100% { transform: rotateY(0deg); }
        }
        @keyframes pulse {
          0%, 100% { opacity: 1; }
          50% { opacity: .5; }
        }
      </style>
      <div class="initial-loader">
        <div class="book-loader">
          <div class="page-inner">
            <div class="page left"></div>
            <div class="page middle"></div>
            <div class="page right"></div>
          </div>
        </div>
        <p class="loader-text">Đang tải trải nghiệm...</p>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
